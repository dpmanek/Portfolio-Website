<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>·</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a0a0b;
        color: #ededef;
        font: 15px/1.5 ui-monospace, "JetBrains Mono", Menlo, monospace;
        padding: 1.5rem;
      }
      .card {
        width: 100%;
        max-width: 420px;
        border: 1px solid #26262b;
        border-radius: 14px;
        padding: 1.8rem;
        background: #101013;
      }
      h1 { font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: #8a8a94; margin: 0 0 1.4rem; font-weight: 500; }
      label { display: block; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: #8a8a94; margin: 1rem 0 0.4rem; }
      input {
        width: 100%;
        padding: 0.7rem 0.85rem;
        background: #0a0a0b;
        border: 1px solid #2c2c33;
        border-radius: 8px;
        color: #ededef;
        font: inherit;
      }
      input[type="file"] { padding: 0.55rem; }
      input:focus { outline: none; border-color: #c6f24e; }
      button {
        width: 100%;
        margin-top: 1.6rem;
        padding: 0.8rem;
        border: none;
        border-radius: 99px;
        background: #c6f24e;
        color: #0a0a0b;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      .status { margin-top: 1.1rem; font-size: 0.8rem; min-height: 1.2em; }
      .ok { color: #7fe28a; }
      .err { color: #ff6b6b; }
      a.view { display: inline-block; margin-top: 0.8rem; font-size: 0.78rem; color: #c6f24e; }
    </style>
  </head>
  <body>
    <form class="card" id="f">
      <h1>résumé · replace</h1>
      <label for="pw">passphrase</label>
      <input id="pw" type="password" autocomplete="off" required />
      <label for="file">new résumé (PDF)</label>
      <input id="file" type="file" accept="application/pdf" required />
      <button id="btn" type="submit">Upload &amp; replace</button>
      <div class="status" id="status"></div>
    </form>
    <script>
      const f = document.getElementById('f')
      const status = document.getElementById('status')
      const btn = document.getElementById('btn')
      f.addEventListener('submit', async (e) => {
        e.preventDefault()
        const pw = document.getElementById('pw').value
        const file = document.getElementById('file').files[0]
        if (!file) return
        const fd = new FormData()
        fd.append('file', file)
        btn.disabled = true
        status.textContent = 'uploading…'
        status.className = 'status'
        try {
          const res = await fetch('/api/admin/upload', {
            method: 'POST',
            headers: { 'x-admin-password': pw },
            body: fd,
          })
          const data = await res.json().catch(() => ({}))
          if (res.ok) {
            status.className = 'status ok'
            status.innerHTML =
              'replaced ✓ &nbsp; <a class="view" href="/api/resume" target="_blank">view live résumé →</a>'
          } else {
            const map = {
              unauthorized: 'wrong passphrase',
              disabled: 'admin not configured (set ADMIN_PASSWORD in Vercel)',
              pdf_only: 'must be a PDF',
              too_large: 'file too large (max 8 MB)',
              no_file: 'no file selected',
            }
            status.className = 'status err'
            status.textContent = map[data.error] || 'upload failed (' + res.status + ')'
          }
        } catch {
          status.className = 'status err'
          status.textContent = 'network error'
        } finally {
          btn.disabled = false
        }
      })
    </script>
  </body>
</html>
